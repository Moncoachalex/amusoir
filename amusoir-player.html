<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AMUSOIR — Joueur</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="ably.min-1.js"></script>
<style>
:root{--bg:#07070f;--s1:#0f0f1c;--s2:#16162a;--gold:#f5c542;--cyan:#00e5ff;--pink:#ff2d6b;--green:#00f5a0;--text:#f0f0ff;--dim:#666688;--border:rgba(255,255,255,0.08);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow:hidden;}
body{display:flex;flex-direction:column;}
.screen{display:none;flex-direction:column;height:100%;padding:20px 16px;align-items:center;justify-content:center;gap:16px;}
.screen.active{display:flex;}

/* JOIN */
#join{background:radial-gradient(ellipse 120% 60% at 50% 0%,#150a30 0%,var(--bg) 70%);}
.logo{font-family:'Outfit',sans-serif;font-size:52px;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,var(--gold),var(--pink),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.jcard{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:24px 20px;width:100%;display:flex;flex-direction:column;gap:14px;}
.jcard label{font-size:10px;letter-spacing:4px;color:var(--dim);text-transform:uppercase;}
.jcard input{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:20px;outline:none;transition:.2s;text-align:center;width:100%;}
.jcard input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,197,66,.12);}
#roomin{text-transform:uppercase;letter-spacing:8px;font-size:24px;font-family:'Outfit',sans-serif;font-weight:900;}
.btn-join{font-family:'Outfit',sans-serif;font-weight:900;font-size:18px;padding:16px;border-radius:14px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--gold),#e8a020);color:#1a1008;box-shadow:0 4px 16px rgba(245,197,66,.4);width:100%;touch-action:manipulation;}
.btn-join:active{transform:scale(.97);}

/* LOBBY */
#player-lobby{background:radial-gradient(ellipse 120% 60% at 50% 0%,#150a30 0%,var(--bg) 70%);text-align:center;}
.mybadge{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;}
.mydot{width:44px;height:44px;border-radius:50%;}
.myname{font-family:'Outfit',sans-serif;font-size:28px;font-weight:900;}
.roombadge{background:var(--s2);border-radius:10px;padding:8px 16px;font-size:10px;letter-spacing:4px;color:var(--dim);text-transform:uppercase;}
.roombadge span{color:var(--gold);font-family:'Outfit',sans-serif;font-size:20px;letter-spacing:8px;font-weight:900;}
.waiting{color:var(--dim);font-size:11px;letter-spacing:2px;text-transform:uppercase;}
.pdot-anim{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.5s ease-in-out infinite;margin-right:6px;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}

/* BT */
#bt-screen{background:radial-gradient(ellipse 120% 50% at 50% 0%,#1a0010 0%,var(--bg) 70%);}
.phase-lbl{font-size:10px;letter-spacing:4px;color:var(--dim);text-transform:uppercase;}
.bt-st{font-family:'Outfit',sans-serif;font-size:22px;font-weight:900;text-align:center;}
.buzz-big{width:180px;height:180px;border-radius:50%;font-family:'Outfit',sans-serif;font-size:26px;font-weight:900;border:none;cursor:pointer;color:white;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(255,45,107,.5);background:linear-gradient(135deg,var(--pink),#aa1040);touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.buzz-big:disabled{opacity:.25;cursor:not-allowed;box-shadow:none;}
.buzz-big.fired{animation:bfire .4s ease;}
@keyframes bfire{0%{transform:scale(1)}40%{transform:scale(1.18)}70%{transform:scale(.94)}100%{transform:scale(1)}}
.tdisp{font-family:'Outfit',sans-serif;font-size:52px;font-weight:900;color:var(--gold);}
.tbg{width:100%;height:5px;background:var(--s2);border-radius:3px;overflow:hidden;}
.tfill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold),var(--pink));border-radius:3px;transition:width 1s linear;}
.revmini{background:var(--s2);border:1px solid var(--green);border-radius:11px;padding:12px 16px;width:100%;text-align:center;display:none;}
.revmini.show{display:block;animation:pop .3s ease;}
@keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.reva{font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;}
.revt{font-family:'Outfit',sans-serif;font-size:18px;font-weight:900;color:var(--green);margin-top:4px;}

/* QUIZ */
#quiz-screen{background:radial-gradient(ellipse 120% 60% at 50% -10%,#0a0020 0%,#050508 70%);justify-content:flex-start;padding-top:14px;overflow-y:auto;}
.qmini{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px 14px;width:100%;text-align:center;}
.qmcat{font-size:10px;letter-spacing:3px;color:#9999bb;text-transform:uppercase;margin-bottom:8px;font-family:'DM Mono',monospace;}
.qmtxt{font-family:'Outfit',sans-serif;font-size:clamp(17px,5vw,24px);font-weight:900;line-height:1.3;color:white;word-break:break-word;}
.amob{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;}
.abtn{border:none;border-radius:18px;padding:14px 10px;cursor:pointer;display:flex;align-items:center;justify-content:center;min-height:88px;font-family:'Outfit',sans-serif;font-size:clamp(14px,4vw,18px);font-weight:800;color:white;text-shadow:0 1px 3px rgba(0,0,0,.4);box-shadow:0 5px 0 rgba(0,0,0,.3);text-align:center;animation:tileIn .3s cubic-bezier(.34,1.56,.64,1) both;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
@keyframes tileIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.abtn:active:not(:disabled){transform:scale(.93);box-shadow:0 2px 0 rgba(0,0,0,.3);}
.abtn.selected{box-shadow:0 0 0 4px white,0 0 20px rgba(255,255,255,.3)!important;transform:scale(1.03)!important;}
.abtn.right{box-shadow:0 0 0 5px white,0 0 24px rgba(255,255,255,.4)!important;transform:scale(1.04)!important;}
.abtn.wrong{opacity:.25;}
.abtn:disabled{cursor:not-allowed;}

/* SCORES */
.scorewrap{width:100%;display:flex;flex-direction:column;gap:6px;margin-top:4px;}
.smini{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:8px 12px;display:flex;align-items:center;gap:9px;}
.sdot{width:7px;height:7px;border-radius:50%;}
.sname{flex:1;font-size:13px;}
.spts{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;}

/* SCORE FINAL */
#score-screen{background:radial-gradient(ellipse 120% 50% at 50% 0%,#100a2a 0%,var(--bg) 70%);text-align:center;}
.myrank{font-family:'Outfit',sans-serif;font-size:72px;font-weight:900;}
.srlist{width:100%;display:flex;flex-direction:column;gap:7px;}
.srrow{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:9px 12px;display:flex;align-items:center;gap:9px;}
.srrank{font-family:'Outfit',sans-serif;font-size:20px;font-weight:900;min-width:28px;}
.srname{flex:1;font-size:13px;}
.srpts{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;}

.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--border);padding:9px 18px;border-radius:9px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:1000;white-space:nowrap;}
.toast.show{opacity:1;}
.sbar{position:fixed;top:9px;right:11px;font-size:10px;padding:3px 9px;border-radius:15px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;gap:5px;z-index:50;}
.sled{width:6px;height:6px;border-radius:50%;background:#444;}
.sled.ok{background:var(--green);}
.sled.err{background:var(--pink);}
</style>
</head>
<body>
<div class="sbar"><div class="sled" id="sled"></div><span id="stxt">—</span></div>
<div class="toast" id="toast"></div>

<!-- JOIN -->
<div class="screen active" id="join">
  <div class="logo">AMUSOIR</div>
  <div class="jcard">
    <label>Ton prénom</label>
    <input type="text" id="namein" placeholder="Marie" maxlength="14" autocomplete="off" autocorrect="off" autocapitalize="words">
    <label>Code de la salle</label>
    <input type="text" id="roomin" placeholder="XXXX" maxlength="6" autocomplete="off" autocorrect="off" autocapitalize="characters">
    <button class="btn-join" id="join-btn">REJOINDRE →</button>
  </div>
</div>

<!-- LOBBY -->
<div class="screen" id="player-lobby">
  <div class="mybadge">
    <div class="mydot" id="mydot"></div>
    <div class="myname" id="mynamedisplay">—</div>
  </div>
  <div class="roombadge">Salle <span id="myroom">—</span></div>
  <div class="waiting"><span class="pdot-anim"></span>En attente du maître du jeu...</div>
</div>

<!-- BT -->
<div class="screen" id="bt-screen">
  <div class="phase-lbl" id="bt-phase">EN ATTENTE</div>
  <div class="bt-st" id="bt-st">⏳ Prêt !</div>
  <div class="tdisp" id="tdisp">—</div>
  <div class="tbg" style="width:100%"><div class="tfill" id="tfill" style="width:100%"></div></div>
  <button class="buzz-big" id="buzzbtn" disabled>BUZZ !</button>
  <div class="revmini" id="revmini"><div class="reva" id="revma">—</div><div class="revt" id="revmt">—</div></div>
  <div class="scorewrap" id="btscores"></div>
</div>

<!-- QUIZ -->
<div class="screen" id="quiz-screen">
  <div class="qmini"><div class="qmcat" id="qmcat">—</div><div class="qmtxt" id="qmtxt">En attente...</div></div>
  <div class="amob" id="amob"></div>
  <div class="scorewrap" id="qscores"></div>
</div>

<!-- SCORE FINAL -->
<div class="screen" id="score-screen">
  <div style="font-family:'Outfit',sans-serif;font-size:28px;font-weight:900;">🏆 Résultats</div>
  <div class="myrank" id="myrank">—</div>
  <div class="srlist" id="srlist"></div>
  <button onclick="go('join')" style="margin-top:10px;background:transparent;border:1px solid #333355;color:var(--dim);font-family:'Outfit',sans-serif;padding:11px 22px;border-radius:12px;font-size:14px;cursor:pointer;">← Retour</button>
</div>

<script>
const ABLY_KEY='U7BRyw.wc4MuQ:5b4cqlgpCcY0b0-Hhl3if0pG9LqsshyQh9ovTu7j9KQ';
const COLORS=['#ff2d6b','#00e5ff','#00f5a0','#f5c542','#ff7b00','#c77dff','#ff9ef5','#4cc9f0'];
let myId=Math.random().toString(36).substring(2,10);
let myName='',myColor='',roomCode='',ablyChan=null;
let btTime=30,btInterval=null,buzzDone=false;

// ── Lire ?room= dans l'URL APRÈS chargement complet ──
window.addEventListener('load',function(){
  const params=new URLSearchParams(window.location.search);
  const urlRoom=params.get('room');
  if(urlRoom){
    document.getElementById('roomin').value=urlRoom.toUpperCase();
  }
});

function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Bouton REJOINDRE avec touchstart pour réactivité iOS ──
document.addEventListener('DOMContentLoaded',function(){
  const btn=document.getElementById('join-btn');
  btn.addEventListener('touchstart',function(e){e.preventDefault();joinRoom();},{passive:false});
  btn.addEventListener('click',joinRoom);

  const buzzbtn=document.getElementById('buzzbtn');
  buzzbtn.addEventListener('touchstart',function(e){e.preventDefault();if(!buzzbtn.disabled)doBuzz();},{passive:false});
  buzzbtn.addEventListener('click',function(){if(!buzzbtn.disabled)doBuzz();});
});

function joinRoom(){
  myName=document.getElementById('namein').value.trim();
  roomCode=document.getElementById('roomin').value.trim().toUpperCase();
  if(!myName){showToast('Entre ton prénom !');return;}
  if(!roomCode){showToast('Entre le code de la salle !');return;}
  myColor=COLORS[Math.floor(Math.random()*COLORS.length)];
  document.getElementById('mydot').style.background=myColor;
  document.getElementById('mynamedisplay').textContent=myName;
  document.getElementById('myroom').textContent=roomCode;
  go('player-lobby');
  connectAbly();
}

function connectAbly(){
  try{
    const ably=new Ably.Realtime(ABLY_KEY);
    ably.connection.on('connected',()=>{
      document.getElementById('sled').className='sled ok';
      document.getElementById('stxt').textContent='Connecté ✓';
      ablyChan=ably.channels.get('amusoir-'+roomCode);
      ablyChan.subscribe('state',(msg)=>onState(msg.data));
      ablyChan.publish('join',{id:myId,name:myName,color:myColor});
    });
    ably.connection.on('disconnected',()=>{document.getElementById('sled').className='sled err';document.getElementById('stxt').textContent='Reconnexion...';});
    ably.connection.on('failed',()=>{document.getElementById('sled').className='sled err';document.getElementById('stxt').textContent='Erreur réseau';});
  }catch(e){document.getElementById('stxt').textContent='Erreur: '+e.message;}
}

function onState(s){
  const p=s.phase||'';
  if(s.players)renderScores(s.players);
  if(['bt-start','bt-wait','bt-playing','bt-paused','bt-buzzed','bt-correct','bt-wrong','bt-reveal'].includes(p)){
    go('bt-screen');handleBT(p,s);
  }else if(['quiz-start','quiz-question','quiz-reveal'].includes(p)){
    go('quiz-screen');handleQuiz(p,s);
  }else if(p==='scoreboard'){
    showScores(s.players);
  }
}

function handleBT(p,s){
  const btn=document.getElementById('buzzbtn');
  const st=document.getElementById('bt-st');
  const rev=document.getElementById('revmini');
  if(p==='bt-start'||p==='bt-wait'){
    buzzDone=false;btn.disabled=true;
    btn.style.background='linear-gradient(135deg,var(--pink),#aa1040)';
    st.textContent='⏳ Prêt !';document.getElementById('tdisp').textContent='—';
    document.getElementById('tfill').style.width='100%';
    rev.classList.remove('show');clearInterval(btInterval);btTime=30;
  }else if(p==='bt-playing'){
    btn.disabled=false;st.textContent='🎵 Écoute bien !';
    clearInterval(btInterval);
    btInterval=setInterval(()=>{btTime=Math.max(0,btTime-1);document.getElementById('tdisp').textContent=btTime;document.getElementById('tfill').style.width=(btTime/30*100)+'%';if(btTime<=0)clearInterval(btInterval);},1000);
  }else if(p==='bt-paused'){
    clearInterval(btInterval);st.textContent='⏸ Pause';
  }else if(p==='bt-buzzed'){
    clearInterval(btInterval);
    if(s.buzzer===myId){st.textContent='🔔 C\'est TOI !';btn.style.background='linear-gradient(135deg,var(--gold),#e8a020)';}
    else{btn.disabled=true;st.textContent='🔔 '+s.buzzerName+' a buzzé !';}
  }else if(p==='bt-correct'){
    st.textContent=s.buzzer===myId?'✅ Bravo +1 !':'✅ Bonne réponse !';
  }else if(p==='bt-wrong'){
    if(s.buzzer===myId)st.textContent='❌ Raté !';
    else{btn.disabled=false;st.textContent='🎵 Continue !';buzzDone=false;}
  }else if(p==='bt-reveal'){
    clearInterval(btInterval);btn.disabled=true;
    st.textContent='🎯 La réponse :';
    document.getElementById('revma').textContent=s.artist||'';
    document.getElementById('revmt').textContent=s.title||'';
    rev.classList.add('show');
    btn.style.background='linear-gradient(135deg,var(--pink),#aa1040)';buzzDone=false;
  }
}

function doBuzz(){
  if(buzzDone||!ablyChan)return;
  buzzDone=true;
  const btn=document.getElementById('buzzbtn');
  btn.classList.add('fired');
  setTimeout(()=>btn.classList.remove('fired'),400);
  ablyChan.publish('buzz',{id:myId,name:myName});
  btn.disabled=true;
}

function handleQuiz(p,s){
  if(p==='quiz-start'){
    document.getElementById('qmtxt').textContent='En attente de la première question...';
    document.getElementById('amob').innerHTML='';
  }else if(p==='quiz-question'){
    document.getElementById('qmcat').textContent=s.cat||'';
    document.getElementById('qmtxt').textContent=s.q||'';
    const ans=s.answer;
    // Couleurs fixes par position — mélange déjà fait côté master
    const colors=[
      'linear-gradient(135deg,#e63946,#c1121f)',
      'linear-gradient(135deg,#2196f3,#0d47a1)',
      'linear-gradient(135deg,#43a047,#1b5e20)',
      'linear-gradient(135deg,#ffc107,#e65100)'
    ];
    const container=document.getElementById('amob');
    container.innerHTML='';
    (s.choices||[]).forEach((a,i)=>{
      const btn=document.createElement('button');
      btn.className='abtn';
      btn.dataset.val=a;
      btn.textContent=a;
      btn.style.background=colors[i%4];
      btn.style.animationDelay=(i*0.06)+'s';
      // touchstart pour réactivité immédiate iOS
      btn.addEventListener('touchstart',function(e){
        e.preventDefault();e.stopPropagation();
        if(!btn.disabled)ansQ(btn.dataset.val,ans,container);
      },{passive:false});
      btn.addEventListener('click',function(){
        if(!btn.disabled)ansQ(btn.dataset.val,ans,container);
      });
      container.appendChild(btn);
    });
  }else if(p==='quiz-reveal'){
    document.querySelectorAll('.abtn').forEach(btn=>{
      if(btn.dataset.val===s.answer)btn.classList.add('right');
      else btn.classList.add('wrong');
      btn.disabled=true;
    });
    if(s.players)renderScores(s.players);
  }
}

function ansQ(choice,answer,container){
  // Désactiver tous les boutons immédiatement
  container.querySelectorAll('.abtn').forEach(btn=>{
    btn.disabled=true;
    if(btn.dataset.val===choice)btn.classList.add('selected');
    else btn.style.opacity='0.35';
  });
  // Envoyer la réponse
  if(ablyChan)ablyChan.publish('answer',{id:myId,name:myName,answer:choice});
}

function renderScores(arr){
  const html=arr.map(p=>`<div class="smini"><div class="sdot" style="background:${p.color}"></div><div class="sname">${p.name}</div><div class="spts" style="color:${p.color}">${p.score}</div></div>`).join('');
  document.getElementById('btscores').innerHTML=html;
  document.getElementById('qscores').innerHTML=html;
}

function showScores(arr){
  if(!arr)return;
  const sorted=[...arr].sort((a,b)=>b.score-a.score);
  const medals=['🥇','🥈','🥉'];
  const mi=sorted.findIndex(p=>p.id===myId);
  document.getElementById('myrank').textContent=medals[mi]||(mi>=0?'#'+(mi+1):'?');
  document.getElementById('srlist').innerHTML=sorted.map((p,i)=>`<div class="srrow" style="${p.id===myId?'border-color:'+p.color:''}"><div class="srrank">${medals[i]||i+1}</div><div class="srname" style="color:${p.color}">${p.name}</div><div class="srpts" style="color:${p.color}">${p.score} pts</div></div>`).join('');
  go('score-screen');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
</body>
</html>
